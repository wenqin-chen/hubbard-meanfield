name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      # single-threaded BLAS: bit-reproducible linear algebra for the
      # regression tests that compare repeated eigensolves
      OMP_NUM_THREADS: "1"
      OPENBLAS_NUM_THREADS: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Run test suite
        run: pytest -q
